name: cartkaro_partner_hub
description: "CartKaro Partner Hub"

publish_to: 'none'


version: 1.0.0+1


environment:
  sdk: ^3.11.5


dependencies:

  flutter:
    sdk: flutter


  # ======================
  # ICONS
  # ======================

  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0



  # ======================
  # STATE MANAGEMENT
  # ======================

  provider: ^6.1.5+1



  # ======================
  # NETWORK / API
