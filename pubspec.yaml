name: cartkaro_partner_hub
description: "CartKaro Partner Hub"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^12.0.3

  # State Management
  provider: ^6.1.5+1

  # Network
  dio: ^5.9.2

  # Storage
  shared_preferences: ^2.5.5

  # UI
  google_fonts: ^8.1.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.3.0
  shimmer: ^3.0.0
  lottie: ^3.3.3
  fluttertoast: ^9.1.0
  cached_network_image: ^3.4.1
  lucide_icons: ^0.257.0

  # Routing
  go_router: ^17.3.0

  # Files
  image_picker: ^1.2.2
  file_picker: ^11.0.2

  # Env
  flutter_dotenv: ^6.0.1

  # Utils
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # Dashboard Chart
  fl_chart: ^0.65.0


dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/logo.png